name: Build macOS

on:
  # 手动触发
  workflow_dispatch:
  # 推送 tag 时触发（可选）
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & Package for macOS
        run: npm run pack:mac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Desktop-Pet-macOS
          path: dist/Desktop Pet-darwin-universal/
          retention-days: 30
